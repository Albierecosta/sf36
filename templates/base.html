<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SF-36{% endblock %} — Qualidade de Vida</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="{{ url_for('index') }}" class="logo">SF-36</a>
    <nav>
      <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">Nova Avaliação</a>
      <a href="{{ url_for('pacientes') }}" class="nav-link {% if request.endpoint == 'pacientes' %}active{% endif %}">Pacientes</a>
    </nav>
  </div>
</header>

<main class="container">
  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
      <div class="alert alert-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <p>SF-36 — Versão Brasileira do Questionário de Qualidade de Vida</p>
</footer>

</body>
</html>
